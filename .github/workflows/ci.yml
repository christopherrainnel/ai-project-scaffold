name: CI Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  alignment-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce template-root alignment
        run: |
          BASE_SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          python tools/check_alignment_guard.py --base "$BASE_SHA" --head "${{ github.sha }}"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  quality-and-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install quality and security tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pip-audit bandit

      - name: Lint (ruff)
        run: python -m ruff check build_exe.py tools/scaffold_project.py tests/test_scaffold.py

      - name: Format check (ruff)
        run: python -m ruff format --check build_exe.py tools/scaffold_project.py tests/test_scaffold.py

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports --no-strict-optional build_exe.py tools/scaffold_project.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          printf "ruff\nmypy\nbandit\npip-audit\n" > .ci-deps.txt
          python -m pip_audit -r .ci-deps.txt

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "--config=.gitleaks.toml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Basic SAST scan (bandit)
        run: python -m bandit -r build_exe.py tools/scaffold_project.py -lll
